<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credential - Get Your Certificate</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --success: #10b981;
            --error: #ef4444;
            --bg: #0f172a;
            --bg-secondary: #1e293b;
            --text: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border: #334155;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, #1a1f3a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text);
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 16px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="tel"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: rgba(15, 23, 42, 0.8);
            color: var(--text);
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="tel"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
            background: rgba(15, 23, 42, 1);
        }

        input[type="text"].invalid,
        input[type="tel"].invalid {
            border-color: var(--error);
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
        }

        .char-count {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
            display: none;
        }

        .char-count.show {
            display: block;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }

        button {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-download {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(99, 102, 241, 0.4);
        }

        .btn-download:active {
            transform: translateY(0);
        }

        .btn-reset {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        .btn-reset:hover {
            background: rgba(99, 102, 241, 0.2);
        }

        .message {
            margin-top: 20px;
            padding: 14px 16px;
            border-radius: 10px;
            display: none;
            font-size: 13px;
            font-weight: 500;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.success {
            background: rgba(16, 185, 129, 0.15);
            color: #86efac;
            border: 1px solid rgba(16, 185, 129, 0.3);
            display: block;
        }

        .message.error {
            background: rgba(239, 68, 68, 0.15);
            color: #ff8080;
            border: 1px solid rgba(239, 68, 68, 0.3);
            display: block;
        }

        .message.info {
            background: rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
            border: 1px solid rgba(99, 102, 241, 0.3);
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .spinner {
            border: 3px solid rgba(99, 102, 241, 0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading p {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .features {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .feature {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .feature-icon {
            font-size: 18px;
            flex-shrink: 0;
        }

        @media (max-width: 480px) {
            .container {
                padding: 24px;
                border-radius: 12px;
            }

            h1 {
                font-size: 24px;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">📜</div>
            <h1>Credential</h1>
            <p class="subtitle">Get your certificate instantly</p>
            
        </div>

        <!-- <div class="features">
            <div class="feature">
                <span class="feature-icon">✨</span>
                <span>Fast & Secure Access</span>
            </div>
            <div class="feature">
                <span class="feature-icon">🔐</span>
                <span>Verified with ID & Phone</span>
            </div>
            <div class="feature">
                <span class="feature-icon">⚡</span>
                <span>Instant Download</span>
            </div>
        </div> -->

        <form id="certificateForm">
            <div class="form-group">
                <label for="studentId">Student ID</label>
                <input
                    type="text"
                    id="studentId"
                    placeholder="e.g., PRP22EC000"
                    maxlength="50"
                    required
                >
                <div class="char-count"><span id="studentIdCount">0</span>/50</div>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input
                    type="tel"
                    id="phone"
                    placeholder="e.g., +91 3456789012"
                    maxlength="20"
                    required
                >
                <div class="char-count"><span id="phoneCount">0</span>/20</div>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-download">Download Certificate</button>
                <button type="reset" class="btn-reset">Clear</button>

            </div>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Processing your request...</p>
        </div>

        <div class="message" id="message"></div>

        <div style="margin-top: 40px; text-align: center;">
            <p class="subtitle"><b>Powered by Analekta</b></p>
        </div>
    </div>

    <script>
        const form = document.getElementById('certificateForm');
        const message = document.getElementById('message');
        const loading = document.getElementById('loading');
        const studentIdInput = document.getElementById('studentId');
        const phoneInput = document.getElementById('phone');
        const studentIdCount = document.getElementById('studentIdCount');
        const phoneCount = document.getElementById('phoneCount');

        // Real-time character counter and input validation
        studentIdInput.addEventListener('input', (e) => {
            const length = e.target.value.length;
            studentIdCount.textContent = length;

            // Show counter when typing
            if (length > 0) {
                studentIdInput.nextElementSibling.classList.add('show');
            } else {
                studentIdInput.nextElementSibling.classList.remove('show');
            }
        });

        phoneInput.addEventListener('input', (e) => {
            const length = e.target.value.length;
            phoneCount.textContent = length;

            // Show counter when typing
            if (length > 0) {
                phoneInput.nextElementSibling.classList.add('show');
            } else {
                phoneInput.nextElementSibling.classList.remove('show');
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const studentId = studentIdInput.value.trim();
            const phone = phoneInput.value.trim();

            // Clear previous error styling
            studentIdInput.classList.remove('invalid');
            phoneInput.classList.remove('invalid');

            // Validation
            if (!studentId || !phone) {
                showMessage('Please fill in all fields', 'error');
                if (!studentId) studentIdInput.classList.add('invalid');
                if (!phone) phoneInput.classList.add('invalid');
                return;
            }

            // Validate student ID length
            if (studentId.length > 50) {
                showMessage('Student ID is too long (max 50 characters)', 'error');
                studentIdInput.classList.add('invalid');
                return;
            }

            // Validate phone length
            if (phone.length > 20) {
                showMessage('Phone number is too long (max 20 characters)', 'error');
                phoneInput.classList.add('invalid');
                return;
            }

            // Basic phone validation (should contain numbers)
            if (!/\d/.test(phone)) {
                showMessage('Phone number must contain at least one digit', 'error');
                phoneInput.classList.add('invalid');
                return;
            }

            loading.style.display = 'block';
            message.style.display = 'none';

            try {
                const response = await fetch('/api/get-certificate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        studentId: studentId,
                        phone: phone
                    })
                });

                loading.style.display = 'none';

                if (response.ok) {
                    const contentDisposition = response.headers.get('content-disposition');
                    let filename = 'certificate.pdf';
                    if (contentDisposition) {
                        const filenameMatch = contentDisposition.match(/filename="?(.+?)"?$/);
                        if (filenameMatch) filename = filenameMatch[1];
                    }

                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    document.body.removeChild(a);

                    showMessage('Certificate downloaded successfully! 🎉', 'success');
                    form.reset();
                    studentIdCount.textContent = '0';
                    phoneCount.textContent = '0';
                    studentIdInput.nextElementSibling.classList.remove('show');
                    phoneInput.nextElementSibling.classList.remove('show');
                } else {
                    const errorData = await response.json();
                    showMessage(errorData.message || 'Error downloading certificate', 'error');

                    // Highlight invalid fields if student not found
                    if (response.status === 404) {
                        studentIdInput.classList.add('invalid');
                        phoneInput.classList.add('invalid');
                    }
                }
            } catch (error) {
                loading.style.display = 'none';
                console.error('Error:', error);
                showMessage('An error occurred. Please try again.', 'error');
            }
        });

        function showMessage(text, type) {
            message.textContent = text;
            message.className = `message ${type}`;
        }
    </script>
</body>
</html>
