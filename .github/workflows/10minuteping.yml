name: 10minute render ping

on:
  schedule:
    - cron: '*/10 * * * *'  # Runs daily at midnight UTC
  workflow_dispatch:  # Allows manual triggering

jobs:
  curl-website:
    runs-on: ubuntu-latest

    steps:
      - name: Run cURL on Website
        run: curl -I https://credential-i2ym.onrender.com
